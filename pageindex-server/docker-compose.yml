services:
  pageindex-server:
    build: .
    ports:
      - "127.0.0.1:37779:37779"
    volumes:
      # 호스트 경로를 컨테이너에 동일 경로로 마운트
      # → 플러그인이 넘기는 file_path가 컨테이너 안에서도 그대로 유효
      - ${HOME}/.openclaw/workspace:${HOME}/.openclaw/workspace
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PAGEINDEX_DATA_DIR=${HOME}/.openclaw/workspace/.pageindex
      - PAGEINDEX_PORT=37779
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:37779/health"]
      interval: 30s
      timeout: 5s
      retries: 3
